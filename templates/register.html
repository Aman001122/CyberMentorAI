{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-5">

        <div class="card bg-secondary text-light">
            <div class="card-body">

                <h2 class="mb-4">Create Account</h2>

                <form method="POST">

                    <input
                        class="form-control mb-3"
                        type="text"
                        name="username"
                        placeholder="Username"
                        required>

                    <input
                        class="form-control mb-3"
                        type="email"
                        name="email"
                        placeholder="Email"
                        required>

                    <input
                        class="form-control mb-3"
                        type="password"
                        name="password"
                        placeholder="Password"
                        required>

                    <button class="btn btn-success w-100">
                        Register
                    </button>

                </form>

            </div>
        </div>

    </div>
</div>

{% endblock %}
