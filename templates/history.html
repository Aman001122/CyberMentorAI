{% extends "base.html" %}

{% block content %}

<h1>Analysis History</h1>

{% if analyses %}

    {% for analysis in analyses %}

        <div class="card bg-secondary text-light mb-3">
            <div class="card-body">

                <h5>Incident</h5>

                <p>{{ analysis.incident_text }}</p>

                <hr>

                <h5 class="text-success">
                    <i class="fa-solid fa-search"></i>
                    Analysis Result
</h5>

<pre class="fs-6">{{ analysis.result }}</pre>

            </div>
        </div>

    {% endfor %}

{% else %}

    <div class="alert alert-warning">
        No analyses found.
    </div>

{% endif %}

{% endblock %}
